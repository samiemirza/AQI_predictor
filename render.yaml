services:
  - type: web
    name: aqi-predictor-api
    env: python
    plan: free
    buildCommand: pip install -r requirements-api.txt
    startCommand: gunicorn simple_api_server:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: AQI_ENABLE_TENSORFLOW
        value: "0"
