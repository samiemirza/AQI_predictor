name: Scheduled Pipelines

on:
  schedule:
    # Hourly features pipeline
    - cron: '15 * * * *'
    # Daily training at 00:30 UTC
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  run-feature-pipeline:
    if: github.event.schedule == '15 * * * *'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aqi_project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run feature pipeline (Karachi default)
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python -m src.pipeline run_feature_pipeline --lat 24.8607 --lon 67.0011 --days-back 5

  run-training-pipeline:
    if: github.event.schedule == '30 0 * * *'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aqi_project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run training pipeline
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python -m src.pipeline run_training_pipeline

