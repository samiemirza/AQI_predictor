version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: aqi-predictor-api:latest
    working_dir: /app/aqi_project
    environment:
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    ports:
      - "5001:5001"
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: aqi-predictor-dashboard:latest
    environment:
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

